<div th:fragment="form-content" class="container form-container">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 800px;
            margin-top: 30px;
            margin-bottom: 50px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            color: #0d6efd;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-section {
            background-color: #f1f8ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #0d6efd;
        }
        .form-section h4 {
            color: #0d6efd;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .error {
            color: red;
            font-size: 0.875rem;
            margin-top: 5px;
        }
    </style>
    <h2>Khai Báo Thông Tin Tốt Nghiệp</h2>

    <!-- Thông báo thành công -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}">Khai báo thành công!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Thông báo lỗi hệ thống -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">Lỗi xảy ra!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/sinhvien/save}" method="post" th:object="${sinhVienDto}">
        
        <!-- Thông tin sinh viên -->
        <div class="form-section">
            <h4>Thông Tin Sinh Viên</h4>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="soCMND" class="form-label">Số CMND <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="soCMND" th:field="*{soCMND}">
                    <div th:if="${errorSoCMND}" class="error" th:text="${errorSoCMND}"></div>
                </div>
                <div class="col-md-6">
                    <label for="hoTen" class="form-label">Họ Tên</label>
                    <input type="text" class="form-control" id="hoTen" th:field="*{hoTen}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}">
                </div>
                <div class="col-md-6">
                    <label for="soDT" class="form-label">Số Điện Thoại</label>
                    <input type="text" class="form-control" id="soDT" th:field="*{soDT}">
                </div>
            </div>

            <div class="mb-3">
                <label for="diaChi" class="form-label">Địa Chỉ</label>
                <input type="text" class="form-control" id="diaChi" th:field="*{diaChi}">
            </div>
        </div>

        <!-- Thông tin tốt nghiệp -->
        <div class="form-section">
            <h4>Thông Tin Tốt Nghiệp</h4>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="maTruong" class="form-label">Trường Tốt Nghiệp <span class="text-danger">*</span></label>
                    <select class="form-select" id="maTruong" th:field="*{maTruong}">
                        <option value="">-- Chọn trường --</option>
                        <option th:each="truong : ${truongList}"
                                th:value="${truong.maTruong}"
                                th:text="${truong.tenTruong}">Tên trường</option>
                    </select>
                    <div th:if="${errorMaTruong}" class="error" th:text="${errorMaTruong}"></div>
                </div>
                <div class="col-md-6">
                    <label for="maNganh" class="form-label">Ngành Tốt Nghiệp <span class="text-danger">*</span></label>
                    <select class="form-select" id="maNganh" th:field="*{maNganh}">
                        <option value="">-- Chọn ngành --</option>
                        <option th:each="nganh : ${nganhList}"
                                th:value="${nganh.maNganh}"
                                th:text="${nganh.tenNganh}">Tên ngành</option>
                    </select>
                    <div th:if="${errorMaNganh}" class="error" th:text="${errorMaNganh}"></div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="heTN" class="form-label">Hệ Tốt Nghiệp</label>
                    <input type="text" class="form-control" id="heTN" th:field="*{heTN}">
                </div>
                <div class="col-md-4">
                    <label for="ngayTN" class="form-label">Ngày Tốt Nghiệp <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="ngayTN" th:field="*{ngayTN}">
                    <div th:if="${errorNgayTN}" class="error" th:text="${errorNgayTN}"></div>
                </div>
                <div class="col-md-4">
                    <label for="loaiTN" class="form-label">Loại Tốt Nghiệp</label>
                    <select class="form-select" id="loaiTN" th:field="*{loaiTN}">
                        <option value="Xuất sắc">Xuất sắc</option>
                        <option value="Giỏi">Giỏi</option>
                        <option value="Khá">Khá</option>
                        <option value="Trung bình">Trung bình</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary px-5">Lưu Thông Tin</button>
            <button type="reset" class="btn btn-secondary px-4 ms-2">Nhập Lại</button>
        </div>
    </form>
</div>
